name: MLB Games Played Tracker
on:
  schedule:
    # Runs daily at 9:00 AM UTC (3:00 AM MT) — adjust as needed
    - cron: "0 9 * * *"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  fetch-mlb-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GCP_SHEETS_KEY_B64: ${{ secrets.GCP_SHEETS_KEY_B64 }}
      GOOGLE_SHEET_ID: ${{ secrets.MLBGamesPlayedGOOGLE_SHEET_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true   # faster binary package installs

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.4-${{ hashFiles('**/fetch_mlb_data.R') }}
          restore-keys: |
            ${{ runner.os }}-r-4.4-

      - name: Install R dependencies
        run: |
          Rscript -e "
            pkgs <- c('httr', 'jsonlite', 'dplyr', 'googlesheets4', 'base64enc')
            missing <- pkgs[!pkgs %in% installed.packages()[,'Package']]
            if (length(missing)) install.packages(missing, repos = 'https://cloud.r-project.org')
          "

      - name: Run MLB data fetch
        run: Rscript MLBGamesPlayedTracker.R
