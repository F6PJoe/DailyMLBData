name: Run Daily MLB Hitter Data R Script
on:
  workflow_dispatch:
jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true
    - name: Cache R packages
      uses: actions/cache@v4
      with:
        path: ${{ env.R_LIBS_USER }}
        key: ${{ runner.os }}-r-packages-v1
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
    - name: Install R packages
      run: |
        Rscript -e "
          options(repos = c(CRAN = 'https://cloud.r-project.org'))
          install.packages('pak', dependencies = TRUE)
          pak::pkg_install(c('googlesheets4', 'dplyr', 'httr', 'base64enc', 'jsonlite'))
        "
    - name: Run R script
      env:
        GCP_SHEETS_KEY_B64: ${{ secrets.GCP_SHEETS_KEY_B64 }}
      run: |
        Rscript "daily hitting data.R"
